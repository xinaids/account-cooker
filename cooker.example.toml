rpc_url = "https://api.devnet.solana.com"
agent_count = 3

[timing]
mean_interval_minutes = 45.0
stddev_interval_minutes = 30.0
active_hours = [8, 23]
skip_day_probability = 0.15

[[wallets]]
keypair_path = "wallets/agent-01.json"
label = "agent-01"

[[wallets]]
keypair_path = "wallets/agent-02.json"
label = "agent-02"

[[wallets]]
keypair_path = "wallets/agent-03.json"
label = "agent-03"

[[protocols]]
name = "jupiter_swap"
weight = 3.0
params = { max_balance_fraction = 0.01, slippage_bps = 50, min_swap_lamports = 5000, noise_mints = [
  "So11111111111111111111111111111111111111112", # wSOL
  "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v", # USDC
  "Es9vMFrzaCERmJfrF4H2FYD4KCoNkY11McCe8BenwNYB", # USDT
  "mSoLzYCxHdYgdzU16g5QSh3i5K3z3KZK7ytfqcJm7So",  # mSOL
] }

[[protocols]]
name = "marinade_stake"
weight = 1.0
params = { max_balance_fraction = 0.02, min_stake_lamports = 1000000 }

[[protocols]]
name = "orca_lp"
weight = 1.0
params = { position_size_lamports_max = 50000000 }

# Not enabled by default (weight = 0.0): casts the agent's noise transfers through
# the supersonic-tx router (solanabr/supersonic-tx PR #1, Jmkoygg) instead of a
# plain SOL transfer, so a self-transfer looks like an intent-ambiguous K-leg
# bundle on-chain. Real composability with a third party's deployed program, not a
# reimplementation — see COMPOSABILITY.md. Set weight > 0 to opt in.
[[protocols]]
name = "supersonic_cast"
weight = 0.0
params = { max_balance_fraction = 0.01, min_cast_lamports = 1000000, k = 8 }

# Not enabled by default (enabled = false): periodically moves a small,
# randomized fraction of one wallet's balance to another randomly-chosen
# sibling wallet in this same fleet — the "periodically consolidates and
# redistributes assets" behavior from the bounty brief. Neither the pair nor
# the timing is fixed (see src/consolidation.rs), so it doesn't itself become
# a predictable "hub" tell. Set enabled = true to opt in; requires at least 2
# configured wallets.
[consolidation]
enabled = false
mean_interval_hours = 72.0
stddev_interval_hours = 48.0
fraction_min = 0.05
fraction_max = 0.20
min_balance_lamports = 10000000
reserve_lamports = 5000000

# ACTIVE BY DEFAULT (unlike [consolidation] / supersonic_cast above): fixes
# the "Multi-wallet clustering" gap named in THREAT_MODEL.md — clustering_harness
# measured that this fleet's shared [timing].active_hours + [[protocols]]
# weights (every wallet above uses the SAME window and mix) is the dominant
# signal for grouping wallets back to this operator (ARI 0.42 vs a naive
# baseline's 0.08). Each agent now derives its OWN active_hours window,
# protocol weights, and daily skip probability: the values above stay the
# FLEET'S base persona, and each wallet's actual behavior is that base
# nudged by a small, per-agent deterministic offset (derived from the
# agent's own wallet pubkey — see src/persona.rs — never a shared RNG, so
# it's reproducible across restarts and uncorrelated between agents).
#
# Unlike [consolidation] (moves real funds) or supersonic_cast (new external
# dependency), this is pure config-derivation math with no funds/third-party
# risk, and the vulnerability it fixes is otherwise present in THIS file's
# own defaults — so it ships on. Set all three fields to 0.0 to restore the
# old byte-identical-fleet-persona behavior. See "3c."/"3d." in README.md
# for the active_hours/protocol_weight measured before/after numbers — and
# "3e." for skip_day_probability_fraction below, which is shipped on for
# consistency with its two siblings but was MEASURED to have no significant
# additional clustering-resistance effect at any tested magnitude (an
# honest null result, not hidden).
[persona_jitter]
# Max minutes each agent's active_hours window is shifted from the fleet's
# base window above ([8, 23]). ONE offset in [-30, +30] is drawn per agent
# and applied to BOTH boundaries equally, so each agent's waking-hours
# DURATION is unchanged — only where in the day it falls shifts.
active_hours_minutes = 30.0
# Max fractional perturbation applied independently to each protocol's own
# weight above, e.g. 0.15 = an agent's jupiter_swap weight (base 3.0) is
# drawn from [2.55, 3.45]. A protocol left at weight = 0.0 above
# (supersonic_cast) always stays exactly 0.0 after jitter.
protocol_weight_fraction = 0.15
# Max fractional perturbation applied to each agent's own daily skip
# probability, e.g. 0.15 = an agent's actual skip_day_probability (base
# 0.15 above) is drawn from [0.1275, 0.1725], clamped to [0.0, 1.0]. See
# README.md's "3e." before tuning this one: measured to have no significant
# effect on clustering resistance across its entire valid range (0.0-1.0),
# unlike the two fields above.
skip_day_probability_fraction = 0.15
